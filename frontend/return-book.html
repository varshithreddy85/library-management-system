<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Return Book</h2>

    <div class="row">

        <!-- Left Side -->
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h5 class="mb-4">Return Book Form</h5>

                    <form id="returnBookForm">

                        <div class="mb-3">
                            <label class="form-label">
                                Issue ID
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="issueId"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Member ID
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="memberId"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Book ID
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="bookId"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Return Date
                            </label>
                            <input type="date"
                                   class="form-control"
                                   id="returnDate"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-success w-100">
                            Return Book
                        </button>

                    </form>

                </div>
            </div>

        </div>


        <!-- Right Side -->
        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h5 class="mb-4">
                        Returned Books History
                    </h5>

                    <table class="table table-bordered table-hover">

                        <thead class="table-dark">
                        <tr>
                            <th>Issue ID</th>
                            <th>Member ID</th>
                            <th>Book ID</th>
                            <th>Issue Date</th>
                            <th>Return Date</th>
                            <th>Status</th>
                        </tr>
                        </thead>

                        <tbody id="returnTableBody">

                        <tr>
                            <td>1</td>
                            <td>101</td>
                            <td>15</td>
                            <td>2026-06-20</td>
                            <td>2026-07-02</td>
                            <td>
                                <span class="badge bg-secondary">
                                    Returned
                                </span>
                            </td>
                        </tr>

                        </tbody>

                    </table>

                </div>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
